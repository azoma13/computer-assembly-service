post:
  summary: Create Order
  operationId: CreateOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/create_order_request.yaml"
  responses:
    '200':
      description: Order is created
      content:
        application/json:
          schema:
            $ref: "../components/schemas/create_order_response.yaml"
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../components/errors/bad_request_error.yaml"
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/errors/internal_server_error.yaml"
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "../components/errors/generic_error.yaml"
